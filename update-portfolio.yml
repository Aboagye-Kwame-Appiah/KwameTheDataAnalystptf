name: Update Portfolio Projects

on:
  push:
    branches: [ main ]        # runs whenever you push to main
  schedule:
    - cron: '0 6 * * *'       # also runs daily at 06:00 UTC
  workflow_dispatch:           # lets you trigger manually from GitHub UI

permissions:
  contents: write              # needed to commit repos.json back to the repo

jobs:
  update-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch repos and write repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Aboagye-Kwame-Appiah
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, re

          username = os.environ["GITHUB_USERNAME"]
          token    = os.environ["GITHUB_TOKEN"]

          # Tag known repos with a category + emoji
          CATEGORY_MAP = {
            "E-Commerce-Dashboard-Excel-":                      {"cat":"bi",        "emoji":"📊","label":"E-Commerce · Excel"},
            "E-commerce-Sales-Performance-Dashboard-Power-BI-": {"cat":"bi",        "emoji":"📊","label":"E-Commerce · Power BI"},
            "Data_Driven_Production_Optimization":              {"cat":"operations","emoji":"🏭","label":"Operations · Python"},
            "Active-Product-Sales-Analysis":                    {"cat":"python",    "emoji":"🐍","label":"Python · EDA"},
            "TechSolutions_Ghana_Project":                      {"cat":"bi",        "emoji":"💼","label":"B2B · BI"},
            "Ghana_Adventures_Project":                         {"cat":"tourism",   "emoji":"🌍","label":"Tourism · Analytics"},
          }

          SKIP = {username.lower(), f"{username.lower()}.github.io", "portfolio"}

          # Fetch all public repos (paginated)
          repos, page = [], 1
          while True:
            url = f"https://api.github.com/users/{username}/repos?per_page=100&page={page}&sort=updated"
            req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
            })
            with urllib.request.urlopen(req) as r:
              batch = json.loads(r.read())
            if not batch: break
            repos.extend(batch)
            page += 1

          output = []
          for repo in repos:
            name = repo["name"]
            if name.lower() in SKIP or repo.get("fork"): continue
            override = CATEGORY_MAP.get(name, {})
            description = repo.get("description") or "Analytics project by Kwame Aboagye Appiah."
            display = re.sub(r"[-_]+", " ", name).strip()
            tools = repo.get("topics", [])[:4]
            if repo.get("language") and repo["language"].lower() not in [t.lower() for t in tools]:
              tools.insert(0, repo["language"])
            output.append({
              "name":        display,
              "repo_name":   name,
              "cat":         override.get("cat", "bi"),
              "emoji":       override.get("emoji", "📁"),
              "label":       override.get("label", repo.get("language") or "Analytics"),
              "description": description,
              "tools":       tools[:4],
              "url":         repo["html_url"],
              "stars":       repo.get("stargazers_count", 0),
              "updated":     (repo.get("pushed_at") or "")[:10],
              "is_known":    name in CATEGORY_MAP,
            })

          output.sort(key=lambda r: (not r["is_known"], r["updated"]))

          with open("repos.json","w") as f:
            json.dump(output, f, indent=2)

          print(f"Wrote {len(output)} repos to repos.json")
          PYEOF

      - name: Commit repos.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git diff --staged --quiet || git commit -m "chore: auto-update repos.json [skip ci]"
          git push
